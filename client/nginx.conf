# ---------------------------------------------------------------------------
# nginx reverse proxy / static server for the DevDrops client
# (deployment constraint #2: nginx as reverse proxy, local dev setup okay).
#
# Two jobs:
#   1. Serve the built React SPA, falling back to index.html for any path
#      that isn't a real file — client-side routing owns everything else.
#   2. Reverse-proxy /api/* to the backend, so the browser only ever talks to
#      one origin. This is what docker-compose.yml wires up; on Vercel the
#      equivalent job is done by VITE_API_URL + CORS instead, since Vercel
#      does not let you run this nginx config directly.
# ---------------------------------------------------------------------------

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip the text-based assets; the JS/CSS bundles are the bulk of the payload.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer-when-downgrade always;

    # Hashed filenames (index-<hash>.js) are safe to cache forever; index.html
    # itself must always be revalidated so a deploy is picked up immediately.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Reverse-proxied API — only meaningful when nginx sits in front of the
    # backend container, i.e. the docker-compose setup. On Vercel this block
    # is inert; the client talks to VITE_API_URL directly instead.
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback: any unmatched path is a client-side route.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
    }
}
